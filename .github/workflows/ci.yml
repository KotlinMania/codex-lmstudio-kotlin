name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Fetch upstream Rust source
        run: ./tools/fetch-rust-source.sh

      - name: Build and test macOS arm64
        run: >
          ./gradlew
          compileKotlinMacosArm64
          macosArm64Test
          --no-configuration-cache

  build-linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Install libcurl headers
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Fetch upstream Rust source
        run: ./tools/fetch-rust-source.sh

      - name: Build and test Linux x64
        run: >
          ./gradlew
          compileKotlinLinuxX64
          linuxX64Test
          --no-configuration-cache

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Fetch upstream Rust source
        shell: bash
        run: ./tools/fetch-rust-source.sh

      - name: Build and test Windows mingwX64
        run: ./gradlew compileKotlinMingwX64 mingwX64Test --no-configuration-cache
